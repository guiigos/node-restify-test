name: Test Coveralls

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  workflow:
    name: Build
    runs-on: ubuntu-20.04

    steps:

      - name: Clone repository
        uses: actions/checkout@v2

      - name: Use NodeJs
        uses: actions/setup-node@v1
        with:
          node-version: 14

      - name: Install dependencies
        run: npm install

      - name: Run coverage
        env:
          MONGOMS_DEBUG: 1
        run: npm run nyc

      - name: Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
